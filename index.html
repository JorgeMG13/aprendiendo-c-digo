<!DOCTYPE html>
<html>
<head>
    <title>Python Game Lab PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🐍 Python Game Lab PRO</h1>

<div id="menu">
    <button onclick="irJuego()">🎮 Jugar niveles</button>
    <button onclick="irEditor()">💻 Modo programador</button>
</div>

<!-- JUEGO -->
<div id="juego" class="pantalla oculto">
    <h2 id="nivelTitulo"></h2>

    <p id="pregunta"></p>
    <input id="respuesta">

    <button onclick="comprobar()">Responder</button>

    <p id="feedback"></p>
    <p id="xp"></p>

    <button onclick="volverMenu()">🏠 Menú</button>
</div>

<!-- EDITOR -->
<div id="editor" class="pantalla oculto">
    <h2>💻 Mini Python (simulado)</h2>

    <p>Escribe código tipo Python (print, variables simples):</p>

    <textarea id="code" rows="8"></textarea>

    <button onclick="ejecutar()">▶ Ejecutar</button>

    <pre id="output"></pre>

    <button onclick="volverMenu()">🏠 Menú</button>
</div>

<script src="script.js"></script>

</body>
</html>
