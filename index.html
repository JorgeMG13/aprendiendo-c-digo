<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0D1117;--s1:#161B22;--s2:#21262D;--s3:#30363D;
  --bd:rgba(48,54,61,0.9);
  --tx:#E6EDF3;--tm:#8B949E;--td:#484F58;
  --ac:#58A6FF;--acb:rgba(88,166,255,0.12);--acBd:rgba(88,166,255,0.3);
  --ok:#3FB950;--okb:rgba(63,185,80,0.12);--okBd:rgba(63,185,80,0.3);
  --wa:#D29922;--wab:rgba(210,153,34,0.12);
  --er:#F85149;--erb:rgba(248,81,73,0.12);
  --pu:#BC8CFF;--pub:rgba(188,140,255,0.12);--puBd:rgba(188,140,255,0.3);
  --ye:#E3B341;
  --r:8px;--sw:260px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;font-size:14px;line-height:1.5}

/* Layout */
.app{display:grid;grid-template-columns:var(--sw) 1fr;grid-template-rows:54px 1fr;height:100vh}

/* Header */
.hdr{grid-column:1/-1;background:var(--s1);border-bottom:1px solid var(--bd);padding:0 20px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,#4C8EF0,#BC8CFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-stats{display:flex;align-items:center;gap:12px}
.xp-pill{display:flex;align-items:center;gap:8px;background:var(--s2);padding:5px 12px;border-radius:20px;border:1px solid var(--bd)}
.xp-lbl{color:var(--ye);font-weight:600;font-size:12px}
.xp-bar-w{width:80px;height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.xp-bar{height:100%;background:linear-gradient(90deg,#4C8EF0,#BC8CFF);border-radius:3px;transition:width .4s ease}
.streak{font-size:13px;color:var(--wa);font-weight:600}
.hdrbtn{padding:5px 12px;border-radius:20px;border:1px solid var(--puBd);background:var(--pub);color:var(--pu);font-size:12px;font-weight:500;cursor:pointer}

/* Sidebar */
.sb{background:var(--s1);border-right:1px solid var(--bd);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--s3) transparent;display:flex;flex-direction:column}
.sb::-webkit-scrollbar{width:3px}.sb::-webkit-scrollbar-thumb{background:var(--s3)}
.sb-body{flex:1}
.cat-hdr{padding:14px 16px 6px;display:flex;justify-content:space-between;align-items:center}
.cat-ttl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--tm)}
.cat-cnt{font-size:11px;color:var(--td)}
.cat-bar{height:2px;background:var(--s3);margin:0 16px 6px;border-radius:1px;overflow:hidden}
.cat-bar-f{height:100%;border-radius:1px;transition:width .4s}
.ls-item{padding:7px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;border-left:2px solid transparent;transition:background .15s}
.ls-item:hover{background:var(--s2)}
.ls-item.active{background:var(--acb);border-left-color:var(--ac)}
.ls-dot{font-size:8px;color:var(--td);flex-shrink:0}
.ls-item.done .ls-dot{color:var(--ok)}
.ls-name{font-size:12px;color:var(--tm);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ls-item.active .ls-name{color:var(--tx)}
.ls-xp{font-size:10px;color:var(--td)}
.sb-foot{padding:12px 16px;border-top:1px solid var(--bd)}
.tot-row{display:flex;justify-content:space-between;font-size:11px;color:var(--tm);margin-bottom:4px}
.tot-bar{height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.tot-fill{height:100%;background:linear-gradient(90deg,#3FB950,#58A6FF,#BC8CFF);border-radius:2px;transition:width .4s}

/* Right side */
.right{display:flex;flex-direction:column;overflow:hidden}
.panels{flex:1;display:grid;grid-template-columns:1fr 1fr;overflow:hidden}

/* Lesson panel */
.l-panel{padding:20px;overflow-y:auto;border-right:1px solid var(--bd);scrollbar-width:thin;scrollbar-color:var(--s3) transparent}
.l-panel::-webkit-scrollbar{width:3px}.l-panel::-webkit-scrollbar-thumb{background:var(--s3)}
.l-title{font-size:20px;font-weight:600;margin-bottom:8px}
.l-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;border:1px solid}
.pill-ok{background:var(--okb);color:var(--ok);border-color:var(--okBd)}
.pill-ac{background:var(--acb);color:var(--ac);border-color:var(--acBd)}
.pill-pu{background:var(--pub);color:var(--pu);border-color:var(--puBd)}
.pill-ye{background:var(--wab);color:var(--ye);border-color:rgba(227,179,65,.3)}
.pill-done{background:var(--okb);color:var(--ok);border-color:var(--okBd)}
.sec-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--tm);margin-bottom:8px}
.l-exp{font-size:13px;line-height:1.7;color:var(--tm);margin-bottom:16px}
.l-exp strong{color:var(--tx)}
.code-block{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:14px;font-family:'Fira Code','Cascadia Code','Consolas',monospace;font-size:12px;line-height:1.6;overflow-x:auto;white-space:pre;color:var(--tx);margin-bottom:16px}
.tip{background:var(--acb);border:1px solid var(--acBd);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--ac);display:flex;gap:8px}

/* Practice panel */
.p-panel{display:flex;flex-direction:column;overflow:hidden}
.p-hdr{padding:12px 16px;border-bottom:1px solid var(--bd);background:var(--s1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.p-ttl{font-size:13px;font-weight:600;color:var(--tm)}
.tabs{display:flex;gap:4px}
.tab{padding:4px 12px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--tm);font-size:12px;cursor:pointer;transition:all .15s}
.tab:hover{background:var(--s2);color:var(--tx)}
.tab.on{background:var(--ac);color:#fff;border-color:var(--ac)}

/* Editor */
#ed-tab,#qz-tab{display:none;flex-direction:column;flex:1;overflow:hidden}
#ed-tab.on,#qz-tab.on{display:flex}
.code-ed{flex:1;padding:14px;font-family:'Fira Code','Cascadia Code','Consolas',monospace;font-size:12px;line-height:1.6;background:var(--s2);border:none;color:var(--tx);resize:none;outline:none}
.ed-foot{padding:8px 14px;border-top:1px solid var(--bd);background:var(--s1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.run-btn{padding:6px 14px;background:var(--ok);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:opacity .15s}
.run-btn:hover{opacity:.85}
.cp-btn{padding:6px 10px;background:var(--s2);color:var(--tm);border:1px solid var(--bd);border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s}
.cp-btn:hover{color:var(--tx)}
.out{height:100px;background:#010409;border-top:1px solid var(--bd);padding:10px 14px;font-family:'Fira Code',monospace;font-size:11px;overflow-y:auto;flex-shrink:0}
.out-prompt{color:var(--td);margin-bottom:3px;font-size:10px}

/* Quiz */
.qz-wrap{flex:1;overflow-y:auto;padding:16px;scrollbar-width:thin;scrollbar-color:var(--s3) transparent}
.qz-wrap::-webkit-scrollbar{width:3px}.qz-wrap::-webkit-scrollbar-thumb{background:var(--s3)}
.qz-hdr{margin-bottom:16px}
.qz-ttl{font-size:14px;font-weight:600;margin-bottom:2px}
.qz-sub{font-size:11px;color:var(--tm)}
.q-block{margin-bottom:14px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:14px}
.q-num{font-size:10px;color:var(--td);margin-bottom:4px}
.q-txt{font-size:13px;font-weight:500;margin-bottom:10px}
.opts{display:flex;flex-direction:column;gap:5px}
.opt{padding:8px 12px;background:var(--s1);border:1px solid var(--bd);border-radius:6px;color:var(--tm);font-size:12px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;transition:all .15s}
.opt:hover:not(:disabled){border-color:var(--acBd);color:var(--tx);background:var(--acb)}
.opt.sel{border-color:var(--acBd);color:var(--ac);background:var(--acb)}
.opt.correct{border-color:var(--okBd);background:var(--okb);color:var(--ok)}
.opt.wrong{border-color:rgba(248,81,73,.3);background:var(--erb);color:var(--er)}
.opt-l{width:20px;height:20px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.opt.correct .opt-l{background:var(--ok);color:#fff}
.opt.wrong .opt-l{background:var(--er);color:#fff}
.opt.sel .opt-l{background:var(--ac);color:#fff}
.qz-res{margin-top:12px;padding:14px;border-radius:var(--r);text-align:center}
.qz-res.perfect{background:var(--okb);border:1px solid var(--okBd)}
.qz-res.good{background:var(--acb);border:1px solid var(--acBd)}
.qz-res.poor{background:var(--wab);border:1px solid rgba(210,153,34,.3)}
.res-score{font-size:26px;font-weight:700;margin-bottom:2px}
.qz-res.perfect .res-score{color:var(--ok)}
.qz-res.good .res-score{color:var(--ac)}
.qz-res.poor .res-score{color:var(--wa)}
.res-msg{font-size:12px;color:var(--tm);margin-bottom:8px}
.res-xp{font-size:12px;font-weight:600;color:var(--ye);margin-bottom:10px}
.res-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}

/* Buttons */
.btn-p{padding:7px 16px;background:linear-gradient(135deg,#4C8EF0,#7B5CF0);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-p:hover{opacity:.9}
.btn-g{padding:7px 14px;background:transparent;color:var(--tm);border:1px solid var(--bd);border-radius:6px;font-size:12px;cursor:pointer;transition:all .15s}
.btn-g:hover{color:var(--tx);background:var(--s2)}

/* Bottom bar */
.bot{padding:8px 16px;border-top:1px solid var(--bd);background:var(--s1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mk-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--okBd);background:var(--okb);color:var(--ok);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.mk-btn.done{background:var(--ok);color:#fff;border-color:var(--ok)}
.nav-btns{display:flex;gap:6px}
.nav-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--tm);font-size:12px;cursor:pointer;transition:all .15s}
.nav-btn:hover{color:var(--tx);background:var(--s2)}

/* Toast */
.toast{position:fixed;top:64px;right:20px;background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:14px 18px;max-width:260px;z-index:1000;opacity:0;transform:translateY(-8px);transition:all .3s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateY(0)}
.t-ico{font-size:24px;margin-bottom:4px}
.t-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ye);font-weight:600}
.t-name{font-size:14px;font-weight:600}
.t-desc{font-size:11px;color:var(--tm);margin-top:2px}

/* Badges modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.show{opacity:1;pointer-events:all}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:24px;width:460px;max-height:80vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--s3) transparent}
.modal::-webkit-scrollbar{width:3px}.modal::-webkit-scrollbar-thumb{background:var(--s3)}
.m-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.m-ttl{font-size:17px;font-weight:600}
.m-sub{font-size:12px;color:var(--tm);margin-bottom:18px}
.bdg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.bdg-card{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:14px 10px;text-align:center}
.bdg-card.earned{border-color:var(--ye);background:rgba(227,179,65,.08)}
.bdg-card.locked{opacity:.35;filter:grayscale(1)}
.bdg-ico{font-size:26px;margin-bottom:6px}
.bdg-n{font-size:11px;font-weight:600;color:var(--tx);margin-bottom:2px}
.bdg-d{font-size:10px;color:var(--tm)}
.bdg-ok{font-size:9px;color:var(--ye);margin-top:4px}

/* scrollbars */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
</style>
</head>
<body>
<div class="app">

<!-- Header -->
<header class="hdr">
  <div style="display:flex;align-items:center;gap:12px">
    <div class="logo">🐍 Python Pro</div>
    <span style="font-size:11px;color:var(--td)">Aprende Python desde cero</span>
  </div>
  <div class="hdr-stats">
    <span class="streak">🔥 <span id="streak-n">0</span> días</span>
    <div class="xp-pill">
      <span class="xp-lbl">XP</span>
      <div class="xp-bar-w"><div class="xp-bar" id="xp-bar" style="width:0%"></div></div>
      <span id="xp-val" style="font-size:11px;color:var(--tm)">0</span>
    </div>
    <button class="hdrbtn" onclick="toggleBadges()">🏆 Logros</button>
  </div>
</header>

<!-- Sidebar -->
<aside class="sb">
  <div class="sb-body" id="sb-body"></div>
  <div class="sb-foot">
    <div class="tot-row"><span>Progreso total</span><span id="tot-pct">0%</span></div>
    <div class="tot-bar"><div class="tot-fill" id="tot-fill" style="width:0%"></div></div>
  </div>
</aside>

<!-- Right side -->
<div class="right">
  <div class="panels">

    <!-- Lesson -->
    <div class="l-panel" id="l-panel"></div>

    <!-- Practice -->
    <div class="p-panel">
      <div class="p-hdr">
        <span class="p-ttl">Zona de práctica</span>
        <div class="tabs">
          <button class="tab on" id="tab-ed" onclick="switchTab('ed')">Editor</button>
          <button class="tab" id="tab-qz" onclick="switchTab('qz')">Quiz</button>
        </div>
      </div>

      <!-- Editor tab -->
      <div id="ed-tab" class="on">
        <textarea class="code-ed" id="code-ed" spellcheck="false"></textarea>
        <div class="ed-foot">
          <button class="cp-btn" onclick="copyCode()">📋 Copiar código</button>
          <div style="display:flex;gap:8px;align-items:center">
            <span style="font-size:10px;color:var(--td)">ejecutar en:</span>
            <button class="run-btn" onclick="openShell()">▶ Python Shell</button>
          </div>
        </div>
        <div class="out">
          <div class="out-prompt"># consola de salida</div>
          <div id="out-txt" style="color:var(--tm);font-size:11px">Copia el código arriba y ejecútalo en python.org/shell o tu terminal.</div>
        </div>
      </div>

      <!-- Quiz tab -->
      <div id="qz-tab">
        <div class="qz-wrap" id="qz-wrap"></div>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bot">
    <div style="display:flex;gap:10px;align-items:center">
      <button class="mk-btn" id="mk-btn" onclick="toggleComplete()">✓ Marcar completada</button>
      <span id="xp-hint" style="font-size:11px;color:var(--ye)"></span>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="prevLesson()">← Anterior</button>
      <button class="nav-btn" onclick="nextLesson()">Siguiente →</button>
    </div>
  </div>
</div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="t-ico" id="t-ico"></div>
  <div class="t-lbl">🎖 Nuevo logro desbloqueado</div>
  <div class="t-name" id="t-name"></div>
  <div class="t-desc" id="t-desc"></div>
</div>

<!-- Badges modal -->
<div class="ov" id="ov" onclick="closeOvIfOut(event)">
  <div class="modal">
    <div class="m-hdr">
      <div class="m-ttl">Logros</div>
      <button onclick="toggleBadges()" style="background:none;border:none;color:var(--tm);font-size:20px;cursor:pointer">×</button>
    </div>
    <div class="m-sub" id="m-sub">…</div>
    <div class="bdg-grid" id="bdg-grid"></div>
  </div>
</div>

<script>
const LS = [
  {id:1,cat:'basico',cl:'Básico',xp:10,
   title:'Variables y tipos de datos',
   exp:'En Python, las <strong>variables</strong> se crean asignando un valor directamente, sin declarar el tipo. Python lo detecta solo. Los tipos básicos son: <strong>str</strong> (texto), <strong>int</strong> (entero), <strong>float</strong> (decimal) y <strong>bool</strong> (True/False).',
   code:'nombre = "Jorge"\nedad = 20\npi = 3.14\nactivo = True\n\nprint(nombre)         # Jorge\nprint(edad)           # 20\nprint(type(nombre))   # <class \'str\'>\nprint(type(edad))     # <class \'int\'>\nprint(type(activo))   # <class \'bool\'>',
   tip:'Python es de tipado dinámico: la misma variable puede cambiar de tipo durante la ejecución.',
   quiz:[
     {q:'¿Cuál es el tipo de `nombre = "Jorge"`?',opts:['int','str','bool','float'],a:1},
     {q:'¿Cómo se imprime texto en Python?',opts:['console.log("Hola")','echo("Hola")','print("Hola")','System.out.println("Hola")'],a:2},
     {q:'¿Qué función devuelve el tipo de una variable?',opts:['typeof()','type()','getType()','kind()'],a:1}
   ]},
  {id:2,cat:'basico',cl:'Básico',xp:10,
   title:'Strings (cadenas de texto)',
   exp:'Los <strong>strings</strong> son cadenas de texto entre comillas. Los <strong>f-strings</strong> (f"...") permiten insertar variables directamente con <strong>{}</strong>. Python incluye métodos muy útiles como <strong>upper()</strong>, <strong>lower()</strong>, <strong>replace()</strong> y <strong>split()</strong>.',
   code:'nombre = "Jorge"\nciudad = "Madrid"\n\n# F-string (formato moderno)\nmensaje = f"Hola, {nombre}! Vives en {ciudad}"\nprint(mensaje)\n\n# Métodos de string\nprint(nombre.upper())           # JORGE\nprint(nombre.lower())           # jorge\nprint(len(nombre))              # 5\nprint(nombre.replace("J","G"))  # Gorge\nprint("  hola  ".strip())       # hola',
   tip:'Los f-strings (Python 3.6+) son la forma más moderna y legible de formatear strings.',
   quiz:[
     {q:'¿Qué devuelve `"python".upper()`?',opts:['python','PYTHON','Python','Error'],a:1},
     {q:'¿Cómo obtienes la longitud de "Hola"?',opts:['size("Hola")','\"Hola\".length','len("Hola")','count("Hola")'],a:2},
     {q:'¿Qué símbolo va antes de las comillas en un f-string?',opts:['s','f','t','p'],a:1}
   ]},
  {id:3,cat:'basico',cl:'Básico',xp:10,
   title:'Listas',
   exp:'Las <strong>listas</strong> guardan colecciones ordenadas. Se crean con <strong>[]</strong> y los índices empiezan en <strong>0</strong>. Los índices negativos cuentan desde el final (<strong>-1</strong> es el último). Puedes añadir, eliminar, ordenar y rebanar listas fácilmente.',
   code:'numeros = [1, 2, 3, 4, 5]\nnombres = ["Ana", "Luis", "Marta"]\n\nprint(numeros[0])    # 1  (primero)\nprint(nombres[-1])   # Marta (último)\nprint(numeros[1:3])  # [2, 3] (slice)\n\n# Modificar\nnumeros.append(6)    # añade al final\nnumeros.insert(0, 0) # inserta en pos 0\nnumeros.remove(3)    # elimina valor 3\nnumeros.sort()       # ordena\nprint(len(numeros))  # longitud',
   tip:'Los índices negativos: -1 = último, -2 = penúltimo. Los slices [start:end] son muy potentes.',
   quiz:[
     {q:'¿Cuál es el índice del primer elemento de una lista?',opts:['1','-1','0','None'],a:2},
     {q:'¿Qué hace `lista.append(x)`?',opts:['Elimina x','Añade x al final','Busca x','Ordena la lista'],a:1},
     {q:'¿Cómo se crea una lista vacía?',opts:['{}','()','[]','<>'],a:2}
   ]},
  {id:4,cat:'basico',cl:'Básico',xp:10,
   title:'Diccionarios',
   exp:'Los <strong>diccionarios</strong> almacenan pares <strong>clave: valor</strong>. Se crean con <strong>{}</strong>. Son ideales para datos estructurados. Puedes acceder con <strong>dict["clave"]</strong> o con <strong>.get()</strong> para evitar errores si la clave no existe.',
   code:'persona = {\n    "nombre": "Jorge",\n    "edad": 20,\n    "ciudad": "Madrid"\n}\n\nprint(persona["nombre"])         # Jorge\nprint(persona.get("edad"))       # 20\nprint(persona.get("pais","ES"))  # ES (default)\n\npersona["edad"] = 21             # modificar\npersona["pais"] = "España"       # añadir\ndel persona["ciudad"]            # eliminar\n\nfor clave, valor in persona.items():\n    print(f"{clave}: {valor}")',

let st = {
  done:[],xp:0,streak:0,lastDay:null,pq:0,
  earnedBadges:[],cur:1,ans:{},sub:{},todayDone:0,todayDate:null
};
let activeTab = 'ed';

function save(){localStorage.setItem('pyp2',JSON.stringify(st))}
function load(){
  try{const s=localStorage.getItem('pyp2');if(s)st={...st,...JSON.parse(s)}}catch(e){}
  const today=new Date().toDateString();
  if(st.lastDay!==today){
    const yest=new Date();yest.setDate(yest.getDate()-1);
    st.streak=(st.lastDay===yest.toDateString())?(st.streak||0)+1:1;
    st.lastDay=today;
    if(st.todayDate!==today){st.todayDone=0;st.todayDate=today}
    save();
  }
}
function cur(){return LS.find(l=>l.id===st.cur)||LS[0]}

function renderSB(){
  const cats=[{k:'basico',l:'Básico',c:'#3FB950'},{k:'intermedio',l:'Intermedio',c:'#58A6FF'},{k:'avanzado',l:'Avanzado',c:'#BC8CFF'}];
  let h='';
  cats.forEach(cat=>{
    const cl=LS.filter(l=>l.cat===cat.k);
    const done=cl.filter(l=>st.done.includes(l.id)).length;
    const pct=Math.round(done/cl.length*100);
    h+=`<div class="cat-hdr"><span class="cat-ttl" style="color:${cat.c}88">${cat.l}</span><span class="cat-cnt">${done}/${cl.length}</span></div>
    <div class="cat-bar"><div class="cat-bar-f" style="width:${pct}%;background:${cat.c}"></div></div>`;
    cl.forEach(l=>{
      const isA=l.id===st.cur,isDone=st.done.includes(l.id);
      h+=`<div class="ls-item${isA?' active':''}${isDone?' done':''}" onclick="selLesson(${l.id})">
        <span class="ls-dot">${isDone?'●':'○'}</span>
        <span class="ls-name">${l.title}</span>
        <span class="ls-xp">+${l.xp}</span>
      </div>`;
    });
  });
  document.getElementById('sb-body').innerHTML=h;
}

function renderLesson(){
  const l=cur();
  const isDone=st.done.includes(l.id);
  const cpill=l.cat==='basico'?'pill-ok':l.cat==='intermedio'?'pill-ac':'pill-pu';
  document.getElementById('l-panel').innerHTML=`
    <div style="margin-bottom:18px">
      <div class="l-title">${l.title}</div>
      <div class="l-meta">
        <span class="pill ${cpill}">${l.cl}</span>
        <span class="pill pill-ye">+${l.xp} XP</span>
        ${isDone?'<span class="pill pill-done">✓ Completada</span>':''}
      </div>
    </div>
    <div style="margin-bottom:16px">
      <div class="sec-lbl">Explicación</div>
      <p class="l-exp">${l.exp}</p>
    </div>
    <div style="margin-bottom:16px">
      <div class="sec-lbl">Código de ejemplo</div>
      <div class="code-block">${l.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    </div>
    <div class="tip"><span>💡</span><span>${l.tip}</span></div>
  `;
  document.getElementById('code-ed').value=l.code;
  const mb=document.getElementById('mk-btn');
  mb.textContent=isDone?'✓ Completada':'✓ Marcar completada';
  mb.className='mk-btn'+(isDone?' done':'');
  document.getElementById('xp-hint').textContent=isDone?'':`Gana ${l.xp} XP al completar`;
  document.getElementById('out-txt').textContent='Copia el código y ejecútalo en python.org/shell o tu terminal.';
  document.getElementById('out-txt').style.color='var(--tm)';
  renderQuiz();
}

function renderQuiz(){
  const l=cur(),sub=st.sub[l.id],answers=st.ans[l.id]||{};
  const letters=['A','B','C','D'];
  let h=`<div class="qz-hdr">
    <div class="qz-ttl">Quiz: ${l.title}</div>
    <div class="qz-sub">${sub?'Resultados':'3 preguntas · '+l.xp+' XP al completar'}</div>
  </div>`;
  l.quiz.forEach((q,qi)=>{
    h+=`<div class="q-block">
      <div class="q-num">Pregunta ${qi+1} de ${l.quiz.length}</div>
      <div class="q-txt">${q.q}</div>
      <div class="opts">`;
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(sub){if(oi===q.a)cls+=' correct';else if(answers[qi]===oi)cls+=' wrong';}
      else if(answers[qi]===oi)cls+=' sel';
      h+=`<button class="${cls}" ${sub?'disabled':''} onclick="selAns(${qi},${oi})">
        <span class="opt-l">${letters[oi]}</span>${opt}
      </button>`;
    });
    h+='</div></div>';
  });
  if(!sub){
    h+=`<button class="btn-p" onclick="submitQuiz()" style="width:100%;margin-top:4px">Comprobar respuestas</button>`;
  } else {
    const correct=l.quiz.filter((q,qi)=>answers[qi]===q.a).length;
    const pct=Math.round(correct/l.quiz.length*100);
    const cls=pct===100?'perfect':pct>=66?'good':'poor';
    const msgs={perfect:'🎉 ¡Todo correcto! Excelente.',good:'👍 Bien, pero hay margen de mejora.',poor:'📚 Repasa la lección e inténtalo de nuevo.'};
    h+=`<div class="qz-res ${cls}">
      <div class="res-score">${correct}/${l.quiz.length}</div>
      <div class="res-msg">${msgs[cls]}</div>
      ${pct===100?'<div class="res-xp">+'+l.xp+' XP ganados ⚡</div>':''}
      <div class="res-btns">
        <button class="btn-g" onclick="resetQuiz()">↩ Reintentar</button>
        ${!st.done.includes(l.id)&&cls!=='poor'?'<button class="btn-p" onclick="markComplete()">Marcar completa ✓</button>':''}
        ${st.done.includes(l.id)?'<button class="btn-g" onclick="nextLesson()">Siguiente →</button>':''}
      </div>
    </div>`;
  }
  document.getElementById('qz-wrap').innerHTML=h;
}

function selAns(qi,oi){
  const l=cur();
  if(st.sub[l.id])return;
  if(!st.ans[l.id])st.ans[l.id]={};
  st.ans[l.id][qi]=oi;
  renderQuiz();
}

function submitQuiz(){
  const l=cur(),answers=st.ans[l.id]||{};
  if(Object.keys(answers).length<l.quiz.length){alert('Responde todas las preguntas primero.');return;}
  st.sub[l.id]=true;
  const correct=l.quiz.filter((q,qi)=>answers[qi]===q.a).length;
  if(correct===l.quiz.length){
    st.pq=(st.pq||0)+1;
    if(!st.done.includes(l.id))st.xp=(st.xp||0)+l.xp;
  }
  save();checkBadges();updateHdr();renderQuiz();
}

function resetQuiz(){
  const l=cur();
  delete st.ans[l.id];delete st.sub[l.id];
  save();renderQuiz();
}

function markComplete(){
  const l=cur();
  if(!st.done.includes(l.id)){
    st.done.push(l.id);
    st.todayDone=(st.todayDone||0)+1;
    if(!st.sub[l.id])st.xp=(st.xp||0)+l.xp;
    save();checkBadges();updateHdr();renderLesson();renderSB();renderTotProg();
  }
}

function toggleComplete(){
  const l=cur();
  if(st.done.includes(l.id)){
    st.done=st.done.filter(id=>id!==l.id);
    save();renderLesson();renderSB();renderTotProg();
  } else {markComplete();}
}

function selLesson(id){st.cur=id;save();renderSB();renderLesson();}
function prevLesson(){const i=LS.findIndex(l=>l.id===st.cur);if(i>0)selLesson(LS[i-1].id);}
function nextLesson(){const i=LS.findIndex(l=>l.id===st.cur);if(i<LS.length-1)selLesson(LS[i+1].id);}

function switchTab(t){
  activeTab=t;
  document.getElementById('ed-tab').className=t==='ed'?'on':'';
  document.getElementById('qz-tab').className=t==='qz'?'on':'';
  document.getElementById('tab-ed').className='tab'+(t==='ed'?' on':'');
  document.getElementById('tab-qz').className='tab'+(t==='qz'?' on':'');
}

function copyCode(){
  const code=document.getElementById('code-ed').value;
  navigator.clipboard.writeText(code).then(()=>{
    const b=document.querySelector('.cp-btn');
    b.textContent='✓ Copiado!';
    setTimeout(()=>b.textContent='📋 Copiar código',2000);
  });
}

function openShell(){window.open('https://www.python.org/shell/','_blank');}

function updateHdr(){
  const xp=st.xp||0;
  const maxXP=500;
  document.getElementById('xp-val').textContent=xp+' XP';
  document.getElementById('xp-bar').style.width=Math.min(100,Math.round(xp/maxXP*100))+'%';
  document.getElementById('streak-n').textContent=st.streak||0;
}

function renderTotProg(){
  const done=st.done.length,total=LS.length;
  const pct=Math.round(done/total*100);
  document.getElementById('tot-pct').textContent=pct+'%';
  document.getElementById('tot-fill').style.width=pct+'%';
}

function checkBadges(){
  let newB=null;
  BADGES.forEach(b=>{
    if(!st.earnedBadges.includes(b.id)&&b.fn(st)){
      st.earnedBadges.push(b.id);
      if(!newB)newB=b;
    }
  });
  if(newB){save();showToast(newB);}
}

let toastTm;
function showToast(b){
  const t=document.getElementById('toast');
  document.getElementById('t-ico').textContent=b.ico;
  document.getElementById('t-name').textContent=b.name;
  document.getElementById('t-desc').textContent=b.desc;
  t.className='toast show';
  clearTimeout(toastTm);
  toastTm=setTimeout(()=>t.className='toast',4000);
}

function toggleBadges(){
  const ov=document.getElementById('ov');
  if(ov.classList.contains('show')){ov.classList.remove('show');}
  else{renderBadgesModal();ov.classList.add('show');}
}

function closeOvIfOut(e){if(e.target===document.getElementById('ov'))toggleBadges();}

function renderBadgesModal(){
  const earned=st.earnedBadges||[];
  document.getElementById('m-sub').textContent=`${earned.length} de ${BADGES.length} logros desbloqueados`;
  document.getElementById('bdg-grid').innerHTML=BADGES.map(b=>{
    const isE=earned.includes(b.id);
    return`<div class="bdg-card ${isE?'earned':'locked'}">
      <div class="bdg-ico">${b.ico}</div>
      <div class="bdg-n">${b.name}</div>
      <div class="bdg-d">${b.desc}</div>
      ${isE?'<div class="bdg-ok">✓ Desbloqueado</div>':''}
    </div>`;
  }).join('');
}

// Boot
load();renderSB();renderLesson();updateHdr();renderTotProg();checkBadges();
</script>
</body>
</html>
